; MIPS_STM32 - firmware for the MIPS Rev 6.0 controller migration
; (Arduino Due / SAM3X8E -> STM32H743).
;
; Interim target: WeAct MiniSTM32H743VITX dev board (real STM32H743VIT6 silicon),
; used to de-risk the firmware (command processor, pulse timer, bus queue,
; USB CDC) ahead of the custom 144-pin (STM32H743ZIT6) Rev 6.0 PCB. The bring-up
; board is 100-pin VIT6; the final board is 144-pin ZIT6 - same silicon family
; and peripherals, so firmware validated here transfers, but the FINAL pinout
; (see docs/MIPS_Rev6_PinPlanning_Worksheet.docx, which targets the ZIT6) is
; proven later on the custom board, not this one.
;
; ETHERNET: unlike some other GAA-CE H7 projects, MIPS keeps the ORIGINAL MIPS
; approach - an external RS-232-to-Ethernet module on a UART (design spec 6.3).
; There is therefore NO native LwIP / MAC / PHY stack here: no LwIP lib dirs, no
; LwIP includes, and NO custom linker script / RAM_D2 DMA-descriptor placement.
; The STM32 just drives a UART. This is a deliberate, large simplification vs.
; the Ethernet-stack projects - do not reintroduce that complexity.
;
; Source tree: builds directly out of the CubeMX-generated project under cubemx/
; (Core/Src, Core/Inc, Drivers, Middlewares), same convention as other GAA-CE
; Cube projects. cubemx/ is EMPTY until you run CubeMX (see TODO.md). If your
; CubeMX project nests one level deeper (e.g. cubemx/<name>/Core/Src), add that
; segment to src_dir/include_dir/lib_extra_dirs below.

[platformio]
src_dir = cubemx/Core/Src
include_dir = cubemx/Core/Inc

[env:mips_rev6_h743zit]
platform = ststm32
board = nucleo_h743zi
board_build.mcu = stm32h743zit6
framework = stm32cube

; CubeMX Drivers + Middlewares (e.g. USB device). NO LwIP entries - see header.
lib_extra_dirs =
    cubemx/Drivers
    cubemx/Middlewares/Third_Party
lib_ldf_mode = deep+

; GAACE_Core pulled from the stm32 branch on GitHub (Arduino-free build).
lib_deps =
    https://github.com/GordonAnderson/GAACE_Core.git#stm32

;lib_ignore = GAACE_Core

; 25 MHz HSE crystal. Core runs at 440 MHz (NOT 480): CubeMX enforces a derated
; AXI/AHB ceiling (~225 MHz) below the nominal 240, so DIVN1=176 puts HCLK at
; 220 MHz - under the cap, and still clears every requirement (TIM1 220 MHz ->
; 4400 counts at 50 kHz = true 12-bit). VOS0 + rev V silicon still required.
; See docs/MIPS_Rev6_PinMap.md section 1.
board_build.f_cpu = 440000000L

; Stock CubeMX-generated linker script - NO hand edits needed (no Ethernet DMA
; descriptor sections). CubeMX will emit this file into cubemx/ when you generate;
; confirm the exact name (typically STM32H743xx_FLASH.ld or similar) and set it
; here if PlatformIO does not pick it up automatically from the framework.
; board_build.ldscript = cubemx/STM32H743ZITx_FLASH.ld

upload_protocol = stlink
debug_tool = stlink
; WeAct board has no onboard debug probe - use an external ST-Link.

build_flags =
    -D USE_HAL_DRIVER
    -D USE_FULL_LL_DRIVER
    -D HSE_VALUE=25000000
    -Wall
    ; Project-local libs under lib/ (bus_queue, pulse_timer, transports) are
    ; auto-discovered by PlatformIO's LDF; no extra include flags needed here.
    ; Add -I paths for CubeMX-generated headers only if the LDF misses them.
